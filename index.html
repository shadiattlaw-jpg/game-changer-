<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Escape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <p class="label">Survival Score</p>
        <h1 id="score">0</h1>
      </div>
      <div>
        <p class="label">Personal Best</p>
        <h2 id="best">0</h2>
      </div>
      <div class="controls">
        <p class="label">Controls</p>
        <p>Space / Tap / Click to jump</p>
      </div>
    </section>

    <section class="game-card">
      <div class="sky">
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="cloud cloud-c"></div>
      </div>

      <div class="game-area" id="gameArea">
        <div class="track"></div>
        <div class="player" id="player">
          <div class="face">
            <span class="eye"></span>
            <span class="eye"></span>
            <span class="mouth"></span>
          </div>
          <span class="tie"></span>
        </div>
        <div id="obstacles"></div>

        <div class="overlay" id="overlay">
          <p class="kicker">Quarterly survival training</p>
          <h2>Escape the office chaos</h2>
          <p class="subtitle">Leap over flying meetings, cursed printers, and very aggressive coffee.</p>
          <button id="startButton" type="button">Start Running</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
